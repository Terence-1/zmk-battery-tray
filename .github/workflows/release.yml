name: Build Linux AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run package:linux

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "ZMK Battery Tray ${{ github.ref_name }}"
          body: |
            ## ZMK Battery Tray
            
            System tray application for monitoring ZMK split keyboard battery levels over USB HID.
            
            ### Features
            - Shows battery levels for both halves of a split keyboard
            - Color-coded battery fill (green/yellow/orange/red)
            - Theme-aware icons (adapts to light/dark system theme)
            - Auto-reconnects when device is plugged in
            - Tooltip shows exact percentages on hover
            
            ### Installation
            1. Download the AppImage
            2. Make it executable: `chmod +x ZMK-Battery-Tray-*.AppImage`
            3. Run it: `./ZMK-Battery-Tray-*.AppImage`
            
            ### Linux HID Access
            If the app can't detect your keyboard, create a udev rule:
            ```bash
            echo 'SUBSYSTEM=="hidraw", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="615e", MODE="0666"' | sudo tee /etc/udev/rules.d/99-zmk.rules
            sudo udevadm control --reload-rules && sudo udevadm trigger
            ```
            
            ### Requirements
            - ZMK firmware with [zmk-usb-reporting](https://github.com/Terence-1/zmk-usb-reporting) module
          files: artifacts/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
