name: Build Linux .deb Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev imagemagick

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate launcher icons
        run: |
          mkdir -p build/icons
          for size in 16 32 48 64 128 256 512; do
            convert assets/app-icon.png -resize ${size}x${size} build/icons/${size}x${size}.png
          done

      - name: Build .deb package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/*.deb

      - name: Upload release files artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            release/*.deb
            release/*.yml
            release/*.yaml

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## ZMK Battery Tray
            
            System tray application for monitoring ZMK split keyboard battery levels over USB HID.
            
            ### Features
            - Shows battery levels for both halves of a split keyboard
            - Dynamic battery fill (shows exact percentage level like a phone)
            - Color-coded fill (green/yellow/orange/red based on level)
            - Theme-aware icons (adapts to light/dark system theme)
            - Auto-reconnects when device is plugged in
            - Tooltip shows exact percentages on hover
            - **Auto-update support** - automatically checks for new versions
            - **Configurable left/right swap** - fix incorrect side reporting
            
            ### Installation
            ```bash
            sudo dpkg -i zmk-battery-tray_*.deb
            sudo apt-get install -f  # Install any missing dependencies
            ```
            
            ### Linux HID Access
            If the app can't detect your keyboard, create a udev rule:
            ```bash
            echo 'SUBSYSTEM=="hidraw", ATTRS{idVendor}=="1d50", ATTRS{idProduct}=="615e", MODE="0666"' | sudo tee /etc/udev/rules.d/99-zmk.rules
            sudo udevadm control --reload-rules && sudo udevadm trigger
            ```
            
            ### Requirements
            - ZMK firmware with [zmk-usb-reporting](https://github.com/Terence-1/zmk-usb-reporting) module
          files: |
            artifacts/*.deb
            artifacts/*.yml
            artifacts/*.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
